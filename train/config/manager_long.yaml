seed: 1
total_timesteps: 100000
num_envs: 8
num_steps: 128
learning_rate: 0.00015
gamma: 0.997
gae_lambda: 0.97
update_epochs: 4
minibatch_size: 256
clip_coef: 0.2
ent_coef: 0.02
vf_coef: 0.5

seed: 1
total_timesteps: 100000
num_envs: 8
num_steps: 128
learning_rate: 0.00015
gamma: 0.997
gae_lambda: 0.97
update_epochs: 4
minibatch_size: 256
clip_coef: 0.2
ent_coef: 0.02
vf_coef: 0.5
max_grad_norm: 0.5
max_episode_steps: 500
opponent_pool_path: train/config/opponent_pool_baselines.json
opponent_sampling: elo
switch_penalty: 0.005
decision_time_penalty: 0.001
search_control_mode: hybrid
search_cost_reward_scale: 1.0
max_search_latency_ms: 80.0
auxiliary_reward_scale: 0.2
curriculum_enabled: true
curriculum_stages: chain_construction,deadline_counter,punish,survival,full_match
curriculum_boundaries: "0.15,0.35,0.55,0.75"
behavior_cloning_epochs: 0
generate_teacher_dataset: true
best_window_episodes: 50
best_min_episodes: 50
selfplay_snapshot_interval: 10000
selfplay_eval_games: 10
selfplay_eval_opponents: 3
rollback_min_episodes: 50
rollback_window_episodes: 50
rollback_min_win_rate: 0.15
rollback_min_tactical_success_rate: 0.15
rollback_max_mean_decision_ms: 120.0
rollback_max_profile_dominant_usage_ratio: 0.90
rollback_max_chain_stagnation_episodes: 50
training_depth_scale: 0.33
training_width_scale: 0.33
parallel_envs: true
use_smoke_profiles: false
log_dir: runs/manager_ppo
device: cpu
run_name: manager_long
